name: Build Docker Images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ydemae

jobs:
  prepare:
    name: Get latest tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "untagged")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

  build-symfony-php:
    name: Build symfony-php
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/symfony-php
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push symfony-php
        uses: docker/build-push-action@v6
        with:
          context: .
          file: symfony-php.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-nginx-symfony:
    name: Build nginx-symfony
    runs-on: ubuntu-latest
    needs: [prepare, build-symfony-php]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx-symfony
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push nginx-symfony
        uses: docker/build-push-action@v6
        with:
          context: .
          file: symfony-nginx.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PHP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/symfony-php:latest

  build-nginx-angular:
    name: Build nginx-angular
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx-angular
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push nginx-angular
        uses: docker/build-push-action@v6
        with:
          context: .
          file: angular-build.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
