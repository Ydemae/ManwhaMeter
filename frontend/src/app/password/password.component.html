<div class="row">

  <label for="login" class="form-label">{{this.label}}</label>
  <div class="input-group">
    <span class="input-group-text interactible">
      @if (!showPassword) {
        <i class="fa-solid fa-lock img-button" (click)="togglePasswordVisibility()"></i>
      }
      @if (showPassword) {
        <i class="fa-solid fa-unlock img-button" (click)="togglePasswordVisibility()"></i>
      }
    </span>
    <input [type]="this.showPassword ? 'text' : 'password'"
      class="form-control"
      name="password"
      [placeholder]="this.label"
      [(ngModel)]="this.password"
      (change)="onPasswordChange()">
    </div>
  </div>
  <div class="text-center">
    @if (this.error != '') {
      <small class="text-danger">{{ this.error }}</small>
    }
  </div>
