<div class="content-wrapper">
  @if (this.showError) {
    <div class="alert alert-dismissible alert-danger">
      <button type="button" class="btn-close" data-bs-dismiss="alert" (click)="hideError()"></button>
      <h4 class="alert-heading">{{ this.errTitle }}</h4>
      {{ this.errMessage }}
    </div>
  }

  @if (dataFetched) {
    <div>
      <app-book-form [allTagsList]="this.allTagsList" [submitLabel]="'create'" (submitEmitter)="onCreate($event)" (cancelEmitter)="onCancel()"></app-book-form>
    </div>
  } @else {
    <app-loader></app-loader>
  }
</div>
