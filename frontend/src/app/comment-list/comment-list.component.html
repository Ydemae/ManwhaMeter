<div class="d-flex justify-content-center w-100">
  @for (rating of this.ratingsList; track rating; let i = $index) {
    <app-comment class="m-2 w-100" style="max-width:30rem;" [rating]="rating" [canDelete]="this.isAdmin()" (deleteButtonClicked)="onDeleteButtonClicked(rating.id, i)"></app-comment>
  }
</div>
